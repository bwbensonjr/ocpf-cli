name: Release

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags so hatch-vcs derives the version from the tag.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0

      - name: Build sdist and wheel
        run: uv build

      - name: Validate distribution metadata
        run: uvx twine check dist/*

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # The Trusted Publisher on PyPI is pinned to this environment.
    environment: pypi
    permissions:
      # Required for OIDC Trusted Publishing; no API token is used.
      id-token: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      # Scoped to this job only; used to create the GitHub Release.
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Grab the lines under `## [version]` up to the next `## ` heading,
          # skipping the trailing reference-link definitions.
          awk -v ver="$version" '
            /^## \[/ { if (grab) exit; if ($0 ~ ("^## \\[" ver "\\]")) { grab=1; next } }
            grab && /^\[[^][]+\]: / { next }
            grab { print }
          ' CHANGELOG.md > NOTES.md
          if grep -q '[^[:space:]]' NOTES.md; then
            echo "have_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          # A pre-release suffix (e.g. v1.2.3-rc1) marks a GitHub pre-release.
          if [[ "$tag" == *-* ]]; then
            release_flag=--prerelease
          else
            release_flag=--latest
          fi
          if [ "${{ steps.notes.outputs.have_notes }}" = "true" ]; then
            gh release create "$tag" --title "$tag" --notes-file NOTES.md "$release_flag"
          else
            gh release create "$tag" --title "$tag" --generate-notes "$release_flag"
          fi
